<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiskPulse — Enterprise Risk Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b12;
    --surface: #0d1420;
    --surface2: #121b2e;
    --border: #1e2d47;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --green: #00e5a0;
    --red: #ff3860;
    --yellow: #ffc234;
    --text: #e8f0fe;
    --muted: #5a7a9a;
    --glow: 0 0 30px rgba(0,212,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top nav */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(7,11,18,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.75rem;
  }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--green);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1s infinite;
  }

  .nav-time {
    color: var(--muted);
    font-size: 0.75rem;
  }

  .nav-user {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* Main layout */
  .main {
    position: relative;
    z-index: 1;
    padding: 2rem;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* Page header */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2rem;
    animation: slideDown 0.6s ease forwards;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem;
    font-weight: 300;
    line-height: 1.1;
    color: var(--text);
  }

  .page-title span {
    color: var(--accent);
    font-style: italic;
  }

  .page-subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }

  .header-actions {
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .btn {
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    font-weight: 500;
  }

  .btn-primary:hover {
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
    transform: translateY(-1px);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    animation: slideDown 0.6s ease 0.1s both;
  }

  .tab {
    padding: 0.75rem 1.5rem;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    font-family: 'DM Mono', monospace;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* KPI Strip */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
    animation: slideUp 0.6s ease 0.2s both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-color, var(--accent));
    opacity: 0.6;
  }

  .kpi-card:hover {
    border-color: var(--accent-color, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .kpi-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.5rem;
    color: var(--accent-color, var(--accent));
  }

  .kpi-change {
    font-size: 0.65rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .kpi-change.up { color: var(--green); }
  .kpi-change.down { color: var(--red); }
  .kpi-change.neutral { color: var(--muted); }

  /* Main grid */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 380px;
    grid-template-rows: auto auto;
    gap: 1.5rem;
    animation: slideUp 0.6s ease 0.3s both;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .panel-badge {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    background: rgba(0,212,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.2);
  }

  /* Risk heatmap */
  .heatmap {
    display: grid;
    grid-template-columns: auto repeat(5, 1fr);
    grid-template-rows: auto repeat(5, 1fr);
    gap: 3px;
  }

  .heatmap-cell {
    height: 52px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .heatmap-cell:hover { transform: scale(1.05); z-index: 10; }

  .heatmap-label {
    font-size: 0.55rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.25rem;
    text-align: center;
    line-height: 1.2;
    height: 52px;
  }

  .heatmap-header {
    font-size: 0.55rem;
    color: var(--muted);
    text-align: center;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cell-low { background: rgba(0,229,160,0.15); border: 1px solid rgba(0,229,160,0.2); color: var(--green); }
  .cell-med { background: rgba(255,194,52,0.15); border: 1px solid rgba(255,194,52,0.2); color: var(--yellow); }
  .cell-high { background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.2); color: var(--accent2); }
  .cell-crit { background: rgba(255,56,96,0.2); border: 1px solid rgba(255,56,96,0.3); color: var(--red); }
  .cell-active { box-shadow: 0 0 15px currentColor; transform: scale(1.08); }

  /* Tooltip */
  .tooltip {
    position: absolute;
    background: #0a1929;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    font-size: 0.65rem;
    pointer-events: none;
    z-index: 1000;
    display: none;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .tooltip.visible { display: block; }

  /* SVG Chart */
  .chart-container {
    position: relative;
    width: 100%;
  }

  svg.chart {
    width: 100%;
    overflow: visible;
  }

  /* Risk exposure bars */
  .exposure-bars {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .exposure-item {
    display: grid;
    grid-template-columns: 100px 1fr 60px;
    align-items: center;
    gap: 0.75rem;
  }

  .exposure-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: right;
  }

  .exposure-bar-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: visible;
    position: relative;
  }

  .exposure-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }

  .exposure-bar-fill::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: inherit;
    box-shadow: 0 0 8px currentColor;
  }

  .exposure-pct {
    font-size: 0.7rem;
    font-weight: 500;
  }

  /* Alerts panel */
  .alerts-panel {
    grid-column: 3;
    grid-row: 1 / 3;
  }

  .alert-item {
    display: flex;
    gap: 0.75rem;
    padding: 0.85rem;
    border-radius: 8px;
    margin-bottom: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .alert-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--severity-color);
  }

  .alert-item:hover {
    border-color: var(--severity-color);
    transform: translateX(3px);
  }

  .alert-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
  }

  .alert-body { flex: 1; min-width: 0; }

  .alert-title {
    font-size: 0.72rem;
    font-weight: 500;
    margin-bottom: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Syne', sans-serif;
  }

  .alert-desc {
    font-size: 0.6rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .alert-time {
    font-size: 0.55rem;
    color: var(--muted);
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 2px;
  }

  .severity-badge {
    display: inline-block;
    font-size: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    margin-top: 0.25rem;
    border: 1px solid currentColor;
  }

  /* VaR Gauge */
  .gauge-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem 0;
  }

  .gauge-svg { overflow: visible; }

  .gauge-value {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    fill: var(--text);
  }

  .gauge-label {
    font-size: 0.65rem;
    fill: var(--muted);
  }

  /* Portfolio donut */
  .donut-legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-top: 1rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.62rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Bottom row */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-top: 1.5rem;
    animation: slideUp 0.6s ease 0.4s both;
  }

  /* Scrollbar */
  .alerts-scroll {
    max-height: 500px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* Filter chips */
  .filter-chips {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .chip {
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    color: var(--muted);
    background: none;
    font-family: 'DM Mono', monospace;
  }

  .chip:hover, .chip.active {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Correlation matrix */
  .matrix {
    display: grid;
    gap: 2px;
  }

  .matrix-cell {
    height: 32px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .matrix-cell:hover { filter: brightness(1.3); }

  /* Stress test */
  .stress-scenarios {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .scenario-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .scenario-item:hover { border-color: var(--accent2); }

  .scenario-icon {
    font-size: 1.2rem;
    width: 36px;
    text-align: center;
  }

  .scenario-body { flex: 1; }
  .scenario-name { font-size: 0.72rem; font-family: 'Syne', sans-serif; margin-bottom: 0.2rem; }
  .scenario-impact { font-size: 0.6rem; color: var(--muted); }

  .scenario-loss {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--red);
  }

  /* Run button */
  .scenario-item.running { border-color: var(--yellow); }
  .scenario-item.running .scenario-name { color: var(--yellow); }

  /* Mini sparkline */
  .sparklines {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 1rem;
  }

  .sparkline-item {
    text-align: center;
  }

  .sparkline-title {
    font-size: 0.6rem;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .sparkline-val {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
  }

  /* Notification dot */
  .notif-dot {
    position: absolute;
    top: -2px; right: -2px;
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid var(--bg);
  }

  /* Search bar */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    margin-bottom: 1rem;
  }

  .search-bar input {
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    outline: none;
    width: 100%;
  }

  .search-bar input::placeholder { color: var(--muted); }

  /* Animated number */
  .anim-num { display: inline-block; }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    max-width: 480px;
    width: 90%;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
  }

  .modal-subtitle { font-size: 0.7rem; color: var(--muted); margin-bottom: 1.5rem; }

  .modal-close {
    float: right;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.25rem;
  }

  .modal-close:hover { color: var(--text); }

  .modal-stat {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.72rem;
  }

  .modal-stat:last-child { border-bottom: none; }
  .modal-stat-label { color: var(--muted); }

  /* Range slider */
  .range-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    margin: 1rem 0;
  }

  .range-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent);
  }

  /* Section label */
  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Responsive */
  @media (max-width: 1200px) {
    .dashboard-grid { grid-template-columns: 1fr 1fr; }
    .alerts-panel { grid-column: 1 / 3; grid-row: auto; }
    .kpi-strip { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 768px) {
    .dashboard-grid { grid-template-columns: 1fr; }
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    .bottom-grid { grid-template-columns: 1fr; }
    .main { padding: 1rem; }
  }
</style>
</head>
<body>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Nav -->
<nav>
  <div class="logo">
    <div class="logo-dot"></div>
    RiskPulse
  </div>
  <div class="nav-right">
    <div class="live-indicator">
      <div class="live-dot"></div>
      Live
    </div>
    <div class="nav-time" id="nav-time">—</div>
    <div class="nav-user" style="position:relative">
      RM
      <div class="notif-dot"></div>
    </div>

function animateCounter(id, from, to, dur, fmt) {
  const el = document.getElementById(id);
  const start = performance.now();
  function tick(now) {
    const p = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 4);
    el.textContent = fmt(from + (to - from) * ease);
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ─── VaR Chart ───────────────────────────────────────────────────────
function renderVaRChart(data) {
  const svg = document.getElementById('var-chart');
  const W = svg.parentElement.offsetWidth || 400, H = 120;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * W;
    const y = H - 20 - ((v - min) / (max - min)) * (H - 40);
    return [x, y];
  });

  const pathD = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const areaD = pathD + ` L${W},${H-20} L0,${H-20} Z`;

  // Threshold line at 28M
  const threshY = H - 20 - ((28 - min) / (max - min)) * (H - 40);

  svg.innerHTML = `
    <defs>
      <linearGradient id="varGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${areaD}" fill="url(#varGrad)"/>
    <path d="${pathD}" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round"/>
    <line x1="0" y1="${threshY}" x2="${W}" y2="${threshY}" stroke="#ff3860" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
    <text x="4" y="${threshY - 4}" fill="#ff3860" font-size="9" font-family="DM Mono">Limit $28M</text>
    ${pts.map((p,i) => i === pts.length-1 ? `
      <circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#00d4ff" stroke="#070b12" stroke-width="2"/>
      <text x="${p[0]-18}" y="${p[1]-8}" fill="#00d4ff" font-size="9" font-family="DM Mono">$${data[i]}M</text>
    ` : '').join('')}
  `;
}

function updateVaRChart(period) {
  const n = period === '30D' ? 30 : period === '90D' ? 90 : 365;
  const data = Array.from({length: n}, (_, i) =>
    Math.round(20 + Math.sin(i * 0.3) * 8 + Math.random() * 8 + i * 0.05)
  );
  renderVaRChart(data);
}

function renderCorrMatrix() {
  const el = document.getElementById('corr-matrix');
  const n = corrAssets.length;

  let html = `<div style="display:grid;grid-template-columns:60px repeat(${n},1fr);gap:2px">`;

  corrAssets.forEach(a => html += `<div style="font-size:0.55rem;color:var(--muted);text-align:center;padding:2px">${a}</div>`);

  corrAssets.forEach((row, i) => {
    html += `<div style="font-size:0.55rem;color:var(--muted);display:flex;align-items:center;justify-content:flex-end;padding-right:6px">${row}</div>`;
    corrAssets.forEach((col, j) => {
      const v = corrData[i][j];
      const abs = Math.abs(v);
      const isPos = v > 0;
      const alpha = abs * 0.8;
      const bg = i === j ? 'rgba(0,212,255,0.2)' :
        isPos ? `rgba(255,56,96,${alpha})` : `rgba(0,229,160,${alpha})`;
      const color = i === j ? '#00d4ff' : isPos ? '#ff3860' : '#00e5a0';
      html += `<div class="matrix-cell" style="background:${bg};color:${color}"
        onmouseenter="showTip(event,'${corrAssets[i]} × ${corrAssets[j]}<br>ρ = ${v.toFixed(2)}')"
        onmouseleave="hideTip()">
        ${v === 1 ? '—' : v.toFixed(2)}
      </div>`;
    });
  });

  html += `</div>`;
  el.innerHTML = html;
}

function renderPnLChart() {
  const el = document.getElementById('pnl-chart');
  const data = [2.1,-0.8,3.4,-1.2,0.9,2.8,-0.3,1.7,-2.1,3.2,0.5,-1.8,2.4,1.1,-0.6,2.9,-1.4,0.8,3.1,-0.5,1.9,2.3,-0.9,1.4,2.6,-1.1,0.7,3.0,-0.4,1.6];
  const W = 400, H = 120, mid = H/2;
  const barW = W / data.length - 1;
  const maxAbs = Math.max(...data.map(Math.abs));
  const bars = data.map((v,i) => {
    const h = (Math.abs(v)/maxAbs) * (H/2 - 10);
    const y = v >= 0 ? mid - h : mid;
    const col = v >= 0 ? '#00e5a0' : '#ff3860';
    return `<rect x="${i*(barW+1)}" y="${y}" width="${barW}" height="${h}" fill="${col}" opacity="0.8" rx="1"/>`;
  }).join('');
  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
    <line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="var(--border)" stroke-width="1"/>
    ${bars}
    <text x="0" y="10" fill="var(--green)" font-size="9" font-family="DM Mono">+$3.4M peak</text>
    <text x="0" y="${H-4}" fill="var(--red)" font-size="9" font-family="DM Mono">-$2.1M trough</text>
  </svg>`;
}

function renderVolSurface() {
  const el = document.getElementById('vol-surface');
  const strikes = ['80%','90%','100%','110%','120%'];
  const tenors = ['1M','3M','6M','1Y','2Y'];
  const vols = [
    [28,24,20,22,25],[25,21,18,19,22],[22,19,16,17,20],[20,17,15,16,18],[19,16,14,15,17]
  ];
  let html = `<div style="display:grid;grid-template-columns:30px repeat(5,1fr);gap:2px">`;
  html += `<div></div>`;
  strikes.forEach(s => html += `<div style="font-size:0.5rem;color:var(--muted);text-align:center">${s}</div>`);
  tenors.forEach((t,i) => {
    html += `<div style="font-size:0.5rem;color:var(--muted);display:flex;align-items:center">${t}</div>`;
    strikes.forEach((_,j) => {
      const v = vols[i][j];
      const norm = (v-14)/(28-14);
      const r = Math.round(norm*255), b = Math.round((1-norm)*255);
      html += `<div style="height:32px;border-radius:3px;background:rgba(${r},${Math.round(norm*80)},${b},0.6);display:flex;align-items:center;justify-content:center;font-size:0.55rem;cursor:default"
        onmouseenter="showTip(event,'Strike: ${strikes[j]}<br>Tenor: ${t}<br>IV: ${v}%')" onmouseleave="hideTip()">${v}%</div>`;
    });
  });
  html += `</div><div style="font-size:0.6rem;color:var(--muted);margin-top:0.5rem">Implied Volatility Surface — blue=low, red=high (vol smile)</div>`;
  el.innerHTML = html;
}

function renderRatingChart() {
  const ratings = [{r:'AAA',pct:12,c:'#00e5a0'},{r:'AA',pct:18,c:'#00d4ff'},{r:'A',pct:25,c:'#7c3aed'},{r:'BBB',pct:28,c:'#ffc234'},{r:'BB',pct:11,c:'#ff6b35'},{r:'B',pct:4,c:'#ff3860'},{r:'CCC',pct:2,c:'#ff0055'}];
  const W=300,H=120,cx=150,cy=60,r=50;
  let angle=-Math.PI/2, paths='';
  ratings.forEach(rt => {
    const slice=(rt.pct/100)*Math.PI*2;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
    const large=slice>Math.PI?1:0;
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${rt.c}" opacity="0.85"
      onmouseenter="showTip(event,'${rt.r}: ${rt.pct}%')" onmouseleave="hideTip()" style="cursor:pointer;transition:opacity 0.2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.85"/>`;
    angle+=slice;
  });
  document.getElementById('rating-chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" width="100%"><circle cx="${cx}" cy="${cy}" r="28" fill="var(--surface)"/>
    ${paths}<text x="${cx}" y="${cy+4}" text-anchor="middle" fill="var(--text)" font-size="8" font-family="DM Mono">Ratings</text></svg>

function renderCashflowChart() {
  const days=['D1','D2','D3','D5','D7','D10','D14','D21','D30'];
  const inflow=[800,650,420,310,280,240,180,140,90];
  const outflow=[-600,-780,-520,-380,-290,-260,-200,-160,-110];
  const W=380,H=130,mid=H*0.55;
  const maxV=900;
  const bw=(W/days.length)-4;
  let bars='';
  days.forEach((d,i)=>{
    const x=i*(bw+4)+2;
    const ih=(inflow[i]/maxV)*(mid-15);
    const oh=(Math.abs(outflow[i])/maxV)*(H-mid-15);
    bars+=`<rect x="${x}" y="${mid-ih}" width="${bw/2}" height="${ih}" fill="var(--green)" opacity="0.8" rx="1"/>`;
    bars+=`<rect x="${x+bw/2+1}" y="${mid}" width="${bw/2}" height="${oh}" fill="var(--red)" opacity="0.8" rx="1"/>`;
    bars+=`<text x="${x+bw/2}" y="${H-2}" text-anchor="middle" fill="var(--muted)" font-size="7">${d}</text>`;
  });
  document.getElementById('cashflow-chart').innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" width="100%">
      <line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="var(--border)" stroke-width="1"/>
      ${bars}
      <text x="2" y="12" fill="var(--green)" font-size="8" font-family="DM Mono">▲ Inflows ($M)</text>
      <text x="2" y="${H-12}" fill="var(--red)" font-size="8" font-family="DM Mono">▼ Outflows ($M)</text>
    </svg>`;
}

function renderFundingChart() {
  const sources=[{n:'Retail Deposits',p:38,c:'#00d4ff'},{n:'Wholesale ST',p:22,c:'#7c3aed'},{n:'Wholesale LT',p:18,c:'#00e5a0'},{n:'Central Bank',p:12,c:'#ffc234'},{n:'Equity/Sub Debt',p:10,c:'#ff6b35'}];
  const W=280,H=130,cx=140,cy=65,r=55;
  let angle=-Math.PI/2,paths='';
  sources.forEach(s=>{
    const slice=(s.p/100)*Math.PI*2;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
    const large=slice>Math.PI?1:0;
    paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${s.c}" opacity="0.85"
      onmouseenter="showTip(event,'${s.n}: ${s.p}%')" onmouseleave="hideTip()" style="cursor:pointer"/>`;
    angle+=slice;
  });
  document.getElementById('funding-chart').innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" width="100%">
      <circle cx="${cx}" cy="${cy}" r="30" fill="var(--surface)"/>
      ${paths}
      <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="var(--text)" font-size="8" font-family="DM Mono">Funding</text>
    </svg>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.3rem;margin-top:0.5rem">
    ${sources.map(s=>`<div style="display:flex;align-items:center;gap:4px;font-size:0.57rem;color:var(--muted)"><div style="width:7px;height:7px;border-radius:50%;background:${s.c};flex-shrink:0"></div>${s.n} ${s.p}%</div>`).join('')}</div>`;
}

// ─── Live updates ────────────────────────────────────────────────────
function liveUpdate() {
  const varEl = document.getElementById('kpi-var');
  if (!varEl) return;
  const current = parseFloat(varEl.textContent.replace('$','').replace('M',''));
  const delta = (Math.random() - 0.5) * 0.8;
  const newVal = Math.max(20, current + delta);
  varEl.textContent = `$${newVal.toFixed(1)}M`;
  varEl.style.transition = 'color 0.3s';
  varEl.style.color = delta > 0 ? 'var(--red)' : 'var(--green)';
  setTimeout(() => { if (document.getElementById('kpi-var')) varEl.style.color = 'var(--red)'; }, 800);
}

          ['⚡','Coal exposure limit','$180M near $200M threshold','1 week','var(--accent2)'],
          ['🌿','TNFD framework','Nature-risk disclosure not started','2 weeks','var(--yellow)'],
          ['📊','Board diversity gap','Women in leadership at 38% vs 50% target','1 month','var(--yellow)'],
        ].map(([ic,t,d,tm,c])=>`
          <div class="alert-item" style="--severity-color:${c};margin-bottom:0.4rem">
            <div class="alert-icon">${ic}</div>
            <div class="alert-body">
              <div class="alert-title">${t}</div>
              <div class="alert-desc">${d}</div>
            </div>
            <div class="alert-time">${tm}</div>
          </div>`).join('')}
      </div>
    </div>
  `;

  renderClimateScenarios();
  renderESGSectorChart();
}

function renderClimateScenarios() {
  const scenarios = [
    { name:'Net Zero 2050 (1.5°C)', transition:'$124M', physical:'$48M', total:'$172M', color:'var(--green)', risk:'Low' },
    { name:'Delayed Transition (2°C)', transition:'$89M', physical:'$112M', total:'$201M', color:'var(--yellow)', risk:'Medium' },
    { name:'Current Policies (3°C+)', transition:'$31M', physical:'$298M', total:'$329M', color:'var(--accent2)', risk:'High' },
    { name:'Hot House World (4°C+)', transition:'$12M', physical:'$520M', total:'$532M', color:'var(--red)', risk:'Critical' },
  ];

  document.getElementById('climate-scenarios').innerHTML = scenarios.map(s => `
    <div style="display:flex;align-items:center;gap:0.75rem;padding:0.65rem;background:var(--surface2);border-radius:8px;margin-bottom:0.5rem;border:1px solid var(--border);cursor:pointer;transition:all 0.2s"
      onmouseover="this.style.borderColor='${s.color}'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="width:3px;height:40px;background:${s.color};border-radius:2px;flex-shrink:0"></div>
      <div style="flex:1">
        <div style="font-size:0.68rem;font-family:'Syne',sans-serif;margin-bottom:0.2rem">${s.name}</div>
        <div style="font-size:0.58rem;color:var(--muted)">Transition: ${s.transition} · Physical: ${s.physical}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Syne',sans-serif;font-weight:700;color:${s.color};font-size:0.85rem">${s.total}</div>
        <div style="font-size:0.55rem;color:${s.color}">${s.risk}</div>
      </div>
    </div>
  `).join('');
}

function renderESGSectorChart() {
  const sectors = [
    { name:'Energy (Fossil)', esg:22, exposure:'$420M', color:'#ff3860', risk:'Critical' },
    { name:'Utilities', esg:48, exposure:'$280M', color:'#ff6b35', risk:'High' },
    { name:'Materials', esg:54, exposure:'$310M', color:'#ffc234', risk:'Medium' },
    { name:'Transportation', esg:61, exposure:'$190M', color:'#ffc234', risk:'Medium' },
    { name:'Technology', esg:78, exposure:'$520M', color:'#00d4ff', risk:'Low' },
    { name:'Healthcare', esg:82, exposure:'$240M', color:'#00e5a0', risk:'Low' },
    { name:'Renewables', esg:91, exposure:'$180M', color:'#00e5a0', risk:'Very Low' },
  ];

  document.getElementById('esg-sector-chart').innerHTML = `
    <div style="font-size:0.6rem;color:var(--muted);margin-bottom:0.75rem">ESG Score vs Exposure — lower score = higher transition risk</div>
    ${sectors.map(s => `
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.6rem">
        <div style="width:90px;font-size:0.6rem;color:var(--muted);text-align:right;flex-shrink:0">${s.name}</div>
        <div style="flex:1;height:20px;background:var(--surface2);border-radius:4px;position:relative;overflow:hidden">
          <div style="height:100%;width:${s.esg}%;background:${s.color};border-radius:4px;opacity:0.8;transition:width 1.2s ease;display:flex;align-items:center;padding-left:6px">
            <span style="font-size:0.55rem;color:var(--bg);font-weight:700">${s.esg}</span>
          </div>
        </div>
        <div style="width:60px;font-size:0.6rem;color:${s.color};text-align:right;flex-shrink:0">${s.exposure}</div>
      </div>
    `).join('')}
    <div style="margin-top:0.5rem;display:flex;gap:1rem;justify-content:center">
      <span style="font-size:0.55rem;color:var(--red)">■ Critical</span>
      <span style="font-size:0.55rem;color:var(--accent2)">■ High</span>
      <span style="font-size:0.55rem;color:var(--yellow)">■ Medium</span>
      <span style="font-size:0.55rem;color:var(--green)">■ Low</span>
    </div>
  `;
}

</script>
</body>
</html>
